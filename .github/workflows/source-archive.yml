name: source-archive

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: source-archive-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  archive:
    name: build + hygiene + provenance
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    outputs:
      base64-subjects: ${{ steps.subjects.outputs.base64-subjects }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Build source archive
        run: |
          set -o pipefail
          mkdir -p archive-logs
          ./scripts/build-source-archive.sh dist/chassis-source-ci.tar.gz HEAD \
            2>&1 | tee archive-logs/build-and-hygiene.log

      - name: SLSA subjects (sha256sum lines, base64)
        id: subjects
        run: |
          set -euo pipefail
          # generator_generic_slsa3 expects base64(sha256sum output for each blob).
          SUMS="$(sha256sum dist/chassis-source-ci.tar.gz)"
          B64="$(printf '%s' "$SUMS" | base64 -w0)"
          echo "base64-subjects=$B64" >> "$GITHUB_OUTPUT"

      - name: Upload archive build logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: source-archive-logs
          path: archive-logs/
          if-no-files-found: warn

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: chassis-source-archive
          path: dist/chassis-source-ci.tar.gz

      - name: Attest build provenance (GitHub)
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-path: dist/chassis-source-ci.tar.gz
          push-to-registry: false

  extract-smoke:
    name: verify-foundation from extracted tarball
    needs: archive
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download archive
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: chassis-source-archive
          path: dl/

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # ratchet: master
        with:
          toolchain: 1.86.0
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: |
            crates/chassis-cli
            crates/chassis-core
            crates/chassis-jsonrpc

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Extract and run verify-foundation
        env:
          CHASSIS_VERIFY_LOG_DIR: ${{ github.workspace }}/archive-smoke-logs
        run: |
          set -euo pipefail
          mkdir -p extract "${{ github.workspace }}/archive-smoke-logs"
          tar -xzf dl/chassis-source-ci.tar.gz -C extract
          ROOT="$(find extract -mindepth 1 -maxdepth 1 -type d | head -1)"
          cd "$ROOT"
          ./scripts/verify-foundation.sh

      - name: Upload archive smoke logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: archive-smoke-logs
          path: archive-smoke-logs/
          if-no-files-found: warn

  slsa-provenance:
    name: SLSA generic provenance
    # Reusable generator + release asset upload assume non-PR contexts (`refs/tags/*` or
    # workflow_dispatch). PRs still build the tarball + run extract-smoke.
    if: github.event_name != 'pull_request'
    needs: archive
    secrets: inherit
    permissions:
      id-token: write
      contents: read
      actions: read
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.archive.outputs.base64-subjects }}"
      upload-assets: true
      compile-generator: true

  verify-slsa:
    name: slsa-verifier (source archive)
    if: github.event_name != 'pull_request'
    needs:
      - archive
      - slsa-provenance
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: chassis-source-archive
          path: dl/

      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          pattern: "*.intoto.jsonl"
          merge-multiple: true
          path: prov/

      - uses: slsa-framework/slsa-verifier/actions/installer@eb7007070baa04976cb9e25a0d8034f8db030a86 # v2.5.1

      - name: Verify chassis source tarball
        run: |
          set -euo pipefail
          ART="dl/chassis-source-ci.tar.gz"
          [[ -f "$ART" ]]
          # Provenance artifact names vary (.intoto.jsonl vs multiple.intoto.jsonl).
          PROV="$(find prov -name '*.intoto.jsonl' -print -quit)"
          [[ -n "$PROV" && -f "$PROV" ]]
          slsa-verifier verify-artifact "$ART" \
            --provenance-path "$PROV" \
            --source-uri "github.com/${{ github.repository }}"
