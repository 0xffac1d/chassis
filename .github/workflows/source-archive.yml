name: source-archive

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: source-archive-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  archive:
    name: build + hygiene + provenance
    runs-on: ubuntu-latest
    outputs:
      base64-subjects: ${{ steps.subjects.outputs.base64-subjects }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Build source archive
        run: |
          set -o pipefail
          mkdir -p archive-logs
          ./scripts/build-source-archive.sh dist/chassis-source-ci.tar.gz HEAD \
            2>&1 | tee archive-logs/build-and-hygiene.log

      - name: SLSA subjects (sha256sum lines, base64)
        id: subjects
        run: |
          set -euo pipefail
          # generator_generic_slsa3 expects base64(sha256sum output for each blob).
          SUMS="$(sha256sum dist/chassis-source-ci.tar.gz)"
          B64="$(printf '%s' "$SUMS" | base64 -w0)"
          echo "base64-subjects=$B64" >> "$GITHUB_OUTPUT"

      - name: Upload archive build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: source-archive-logs
          path: archive-logs/
          if-no-files-found: warn

      - uses: actions/upload-artifact@v4
        with:
          name: chassis-source-archive
          path: dist/chassis-source-ci.tar.gz

      - name: Attest build provenance (GitHub)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/chassis-source-ci.tar.gz
          push-to-registry: false

  extract-smoke:
    name: verify-foundation from extracted tarball
    needs: archive
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download archive
        uses: actions/download-artifact@v4
        with:
          name: chassis-source-archive
          path: dl/

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.86.0
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            crates/chassis-cli
            crates/chassis-core
            crates/chassis-jsonrpc

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Extract and run verify-foundation
        env:
          CHASSIS_VERIFY_LOG_DIR: ${{ github.workspace }}/archive-smoke-logs
        run: |
          set -euo pipefail
          mkdir -p extract "${{ github.workspace }}/archive-smoke-logs"
          tar -xzf dl/chassis-source-ci.tar.gz -C extract
          ROOT="$(find extract -mindepth 1 -maxdepth 1 -type d | head -1)"
          cd "$ROOT"
          ./scripts/verify-foundation.sh

      - name: Upload archive smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: archive-smoke-logs
          path: archive-smoke-logs/
          if-no-files-found: warn

  slsa-provenance:
    name: SLSA generic provenance
    needs: archive
    secrets: inherit
    permissions:
      id-token: write
      contents: read
      actions: read
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.archive.outputs.base64-subjects }}"
      upload-assets: true
      compile-generator: true

  verify-slsa:
    name: slsa-verifier (source archive)
    needs:
      - archive
      - slsa-provenance
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@fa0a91b85d603436315cd2323f610224d576a0d4 # v4.1.8
        with:
          name: chassis-source-archive
          path: dl/

      - uses: actions/download-artifact@fa0a91b85d603436315cd2323f610224d576a0d4 # v4.1.8
        with:
          pattern: "*.intoto.jsonl"
          merge-multiple: true
          path: prov/

      - uses: slsa-framework/slsa-verifier-installer@v2.5.1

      - name: Verify chassis source tarball
        run: |
          set -euo pipefail
          ART="dl/chassis-source-ci.tar.gz"
          [[ -f "$ART" ]]
          # Provenance artifact names vary (.intoto.jsonl vs multiple.intoto.jsonl).
          PROV="$(find prov -name '*.intoto.jsonl' -print -quit)"
          [[ -n "$PROV" && -f "$PROV" ]]
          slsa-verifier verify-artifact "$ART" \
            --provenance-path "$PROV" \
            --source-uri "github.com/${{ github.repository }}"
