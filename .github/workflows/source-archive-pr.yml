# PR-only tarball + extract smoke test. Reusable SLSA jobs cannot be conditioned with `if:`
# on the caller job (GitHub rejects the workflow); those live in source-archive.yml (push main).
name: source-archive (PR)

on:
  pull_request:

concurrency:
  group: source-archive-pr-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  archive:
    name: build + hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Build source archive
        run: |
          set -o pipefail
          mkdir -p archive-logs
          ./scripts/build-source-archive.sh dist/chassis-source-ci.tar.gz HEAD \
            2>&1 | tee archive-logs/build-and-hygiene.log

      - name: Upload archive build logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: source-archive-logs
          path: archive-logs/
          if-no-files-found: warn

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: chassis-source-archive
          path: dist/chassis-source-ci.tar.gz

  extract-smoke:
    name: verify-foundation from extracted tarball
    needs: archive
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download archive
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: chassis-source-archive
          path: dl/

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # ratchet: master
        with:
          toolchain: 1.86.0
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: |
            crates/chassis-cli
            crates/chassis-core
            crates/chassis-jsonrpc

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Extract and run verify-foundation
        env:
          CHASSIS_VERIFY_LOG_DIR: ${{ github.workspace }}/archive-smoke-logs
        run: |
          set -euo pipefail
          mkdir -p extract "${{ github.workspace }}/archive-smoke-logs"
          tar -xzf dl/chassis-source-ci.tar.gz -C extract
          ROOT="$(find extract -mindepth 1 -maxdepth 1 -type d | head -1)"
          cd "$ROOT"
          ./scripts/verify-foundation.sh

      - name: Upload archive smoke logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: archive-smoke-logs
          path: archive-smoke-logs/
          if-no-files-found: warn
