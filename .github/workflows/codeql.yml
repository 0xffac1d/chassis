name: CodeQL

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: [rust, javascript]
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@df409f7d926037fbd2facedec903059a8d3a71a0 # v3.28.8
        with:
          languages: ${{ matrix.language }}

      - name: Rust toolchain (rust-toolchain.toml)
        if: matrix.language == 'rust'
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.86.0
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        if: matrix.language == 'rust'
        with:
          workspaces: |
            crates/chassis-cli
            crates/chassis-core
            crates/chassis-jsonrpc

      - uses: github/codeql-action/autobuild@df409f7d926037fbd2facedec903059a8d3a71a0 # v3.28.8

      - uses: github/codeql-action/analyze@df409f7d926037fbd2facedec903059a8d3a71a0 # v3.28.8
        with:
          category: "/language:${{ matrix.language }}"
