name: CodeQL

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (rust + javascript)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: github/codeql-action/init@dd746615b3b9d728a6a37ca2045b68ca76d4841a # v3.28.8
        with:
          languages: javascript,rust

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # ratchet: master
        with:
          toolchain: 1.86.0
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: |
            crates/chassis-cli
            crates/chassis-core
            crates/chassis-jsonrpc

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - uses: github/codeql-action/autobuild@dd746615b3b9d728a6a37ca2045b68ca76d4841a # v3.28.8

      - uses: github/codeql-action/analyze@dd746615b3b9d728a6a37ca2045b68ca76d4841a # v3.28.8
        with:
          category: chassis
          output: codeql-results

      - name: Build chassis CLI (for scanner ingest)
        run: cargo build -p chassis-cli --release

      - name: Normalize CodeQL SARIF for Chassis
        run: |
          set -euo pipefail
          mkdir -p dist
          SARIF="$(find "$GITHUB_WORKSPACE/codeql-results" -type f -name '*.sarif' -print -quit)"
          [[ -n "$SARIF" ]]
          ./target/release/chassis scanner ingest --tool codeql --sarif "$SARIF" --out dist/scanner-codeql.json --repo "$GITHUB_WORKSPACE"

      - name: Upload CodeQL SARIF tree
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: codeql-sarif
          path: codeql-results/
          if-no-files-found: warn

      - name: Upload normalized scanner summary (CodeQL)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: scanner-codeql-summary
          path: dist/scanner-codeql.json
