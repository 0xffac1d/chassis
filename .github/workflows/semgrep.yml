name: semgrep

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: semgrep-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    name: semgrep scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install Semgrep
        run: pip install semgrep==1.90.0

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # ratchet: master
        with:
          toolchain: 1.86.0

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: |
            crates/chassis-cli
            crates/chassis-core
            crates/chassis-jsonrpc

      - name: Scan (SARIF + fail on findings)
        run: semgrep scan --config .semgrep.yml --error --sarif --output semgrep.sarif

      - name: Build chassis CLI (for scanner ingest)
        run: cargo build -p chassis-cli --release

      - name: Normalize Semgrep SARIF for Chassis
        run: |
          set -euo pipefail
          mkdir -p dist
          ./target/release/chassis scanner ingest --tool semgrep --sarif semgrep.sarif --out dist/scanner-semgrep.json --repo "$GITHUB_WORKSPACE"

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@df409f7d926037fbd2facedec903059a8d3a71a0 # v3.28.8
        if: always() && hashFiles('semgrep.sarif') != ''
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Upload Semgrep SARIF artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: semgrep-sarif
          path: semgrep.sarif
          if-no-files-found: warn

      - name: Upload normalized scanner summary (Semgrep)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: scanner-semgrep-summary
          path: dist/scanner-semgrep.json
