name: policy-gate

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: policy-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  policy-opa:
    name: OPA policy gate
    runs-on: ubuntu-latest
    env:
      POLICY_GATE_OUT_DIR: ${{ github.workspace }}/policy-gate-artifacts
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # ratchet: master
        with:
          toolchain: 1.86.0

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: |
            crates/chassis-cli
            crates/chassis-core
            crates/chassis-jsonrpc

      - name: Install OPA
        uses: open-policy-agent/setup-opa@b2b258e089860efaadaaf71bf6e3aecb4a3eeff1 # v2.4.0
        with:
          version: v1.16.2

      - name: Install python jsonschema
        run: python3 -m pip install --upgrade --user jsonschema

      - name: Policy gate (export + shape check + opa test + eval)
        run: ./scripts/policy-gate.sh "$GITHUB_WORKSPACE"

      - name: Upload policy-gate artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: policy-gate-artifacts
          path: policy-gate-artifacts/
          if-no-files-found: warn
