name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-and-node:
    name: verify-foundation (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Rust toolchain (rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.86.0
          components: rustfmt, clippy

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            crates/chassis-cli
            crates/chassis-core
            crates/chassis-jsonrpc

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: npm cache path
        id: npm-cache-dir
        run: echo "dir=$(npm config get cache)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        with:
          path: ${{ steps.npm-cache-dir.outputs.dir }}
          key: npm-${{ runner.os }}-${{ hashFiles('packages/chassis-types/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: verify-foundation.sh
        env:
          CHASSIS_VERIFY_LOG_DIR: ${{ github.workspace }}/verify-foundation-logs
        run: ./scripts/verify-foundation.sh

      - name: Upload verify-foundation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verify-foundation-logs-${{ matrix.os }}
          path: verify-foundation-logs/
          if-no-files-found: warn

  fingerprint-parity:
    name: fingerprint Node vs Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.86.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            crates/chassis-cli
            crates/chassis-core
            crates/chassis-jsonrpc

      - name: Node digest
        id: node
        run: |
          export CHASSIS_REPO_ROOT="$GITHUB_WORKSPACE"
          DIGEST="$(node --input-type=module -e "import { buildManifest, manifestHash } from './packages/chassis-types/scripts/fingerprint-schemas.mjs'; console.log(manifestHash(buildManifest(process.env.CHASSIS_REPO_ROOT)));")"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Rust digest
        id: rust
        env:
          CHASSIS_REPO_ROOT: ${{ github.workspace }}
        run: |
          DIGEST="$(cargo run -p chassis-core --example fingerprint -q)"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Compare
        run: |
          if [ "${{ steps.node.outputs.digest }}" != "${{ steps.rust.outputs.digest }}" ]; then
            echo "::error::Fingerprints diverge node=${{ steps.node.outputs.digest }} rust=${{ steps.rust.outputs.digest }}"
            exit 1
          fi
          echo "OK ${{ steps.node.outputs.digest }}"

  supply-chain:
    name: supply-chain (audit + deny + bans + archive hygiene)
    runs-on: ubuntu-latest
    env:
      # Per-step logs land here and are uploaded as an artifact even on failure
      # so reviewers can read the same output CI saw.
      SUPPLY_CHAIN_LOG_DIR: ${{ github.workspace }}/supply-chain-logs
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.86.0

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            crates/chassis-cli
            crates/chassis-core
            crates/chassis-jsonrpc

      - name: Prepare log dir
        run: mkdir -p "$SUPPLY_CHAIN_LOG_DIR"

      - name: Install cargo-audit
        run: cargo install --locked cargo-audit

      - name: Install cargo-deny
        run: cargo install --locked cargo-deny

      # `--deny warnings` promotes informational advisories to errors. We
      # ignore RUSTSEC-2024-0320 (serde_yaml unmaintained) by ID; rationale,
      # exit criteria, and migration plan live in ADR-0025.
      - name: cargo audit
        run: |
          set -o pipefail
          cargo audit --deny warnings --ignore RUSTSEC-2024-0320 \
            2>&1 | tee "$SUPPLY_CHAIN_LOG_DIR/cargo-audit.log"

      # cargo deny enforces the license allowlist, advisory policy, banned-
      # crates list, and source registry allowlist defined in deny.toml.
      - name: cargo deny check
        run: |
          set -o pipefail
          cargo deny --workspace check \
            2>&1 | tee "$SUPPLY_CHAIN_LOG_DIR/cargo-deny.log"

      # Belt-and-suspenders: read the banned set straight off Cargo.lock so a
      # PR that weakens deny.toml still fails CI.
      - name: Banned-crates lockfile guard
        run: |
          set -o pipefail
          ./scripts/check-banned-crates.sh \
            2>&1 | tee "$SUPPLY_CHAIN_LOG_DIR/check-banned-crates.log"

      # Feature audit: snapshot the resolved feature graph so any change in
      # what features are enabled on transitive deps is visible in the
      # uploaded artifact. Reviewers can diff this between PRs to catch a
      # surprise `default-features = true` or a new "tls" feature creeping in.
      - name: Feature audit (cargo tree)
        run: |
          set -o pipefail
          {
            echo "=== cargo tree --workspace -e features (depth 6) ===" ;
            cargo tree --workspace --edges features --depth 6 ;
            echo ;
            echo "=== cargo tree --workspace --duplicates ===" ;
            cargo tree --workspace --duplicates || true ;
          } 2>&1 | tee "$SUPPLY_CHAIN_LOG_DIR/feature-audit.log"

      # Produce a release source archive AND verify hygiene. Both steps tee
      # their output so the artifact bundle is self-describing.
      - name: Build source archive
        run: |
          set -o pipefail
          ./scripts/build-source-archive.sh dist/chassis-source-ci.tar.gz HEAD \
            2>&1 | tee "$SUPPLY_CHAIN_LOG_DIR/build-source-archive.log"

      - name: Archive hygiene re-check
        run: |
          set -o pipefail
          ./scripts/check-archive-hygiene.sh dist/chassis-source-ci.tar.gz \
            2>&1 | tee "$SUPPLY_CHAIN_LOG_DIR/check-archive-hygiene.log"

      - name: Upload supply-chain logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: supply-chain-logs
          path: ${{ env.SUPPLY_CHAIN_LOG_DIR }}/
          if-no-files-found: warn

      - uses: actions/upload-artifact@v4
        with:
          name: chassis-source-archive
          path: dist/chassis-source-ci.tar.gz

  self-attest:
    name: self-attest (CLI trace + drift + DSSE)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.86.0

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            crates/chassis-cli
            crates/chassis-core
            crates/chassis-jsonrpc

      - name: self-attest.sh
        env:
          SELF_ATTEST_DIR: ${{ github.workspace }}/self-attest-artifacts
          SELF_ATTEST_ARTIFACT: ${{ github.workspace }}/self-attest-artifacts/release-gate.dsse
        run: ./scripts/self-attest.sh

      - uses: actions/upload-artifact@v4
        with:
          name: self-attest-artifacts
          path: self-attest-artifacts/

  policy-opa:
    name: OPA policy gate
    runs-on: ubuntu-latest
    env:
      POLICY_GATE_OUT_DIR: ${{ github.workspace }}/policy-gate-artifacts
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.86.0

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            crates/chassis-cli
            crates/chassis-core
            crates/chassis-jsonrpc

      - name: Install OPA
        uses: open-policy-agent/setup-opa@v2
        with:
          version: v1.16.2

      - name: Policy gate (export + opa test + eval)
        run: ./scripts/policy-gate.sh "$GITHUB_WORKSPACE"

      - name: Upload policy-gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: policy-gate-artifacts
          path: policy-gate-artifacts/
          if-no-files-found: warn
