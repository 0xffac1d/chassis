name: supply-chain

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: supply-chain-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  supply-chain:
    name: supply-chain (audit + deny + bans)
    runs-on: ubuntu-latest
    env:
      SUPPLY_CHAIN_LOG_DIR: ${{ github.workspace }}/supply-chain-logs
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # ratchet: master
        with:
          toolchain: 1.86.0

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: |
            crates/chassis-cli
            crates/chassis-core
            crates/chassis-jsonrpc

      - name: Prepare log dir
        run: mkdir -p "$SUPPLY_CHAIN_LOG_DIR"

      - name: Install cargo-audit
        run: cargo install --locked cargo-audit

      - name: Install cargo-deny
        # cargo-deny 0.18.4+ + 0.19.x require rustc 1.88+; we pin 1.86
        # (rust-toolchain.toml). 0.18.3 is the last release that supports
        # rustc 1.85/1.86.
        run: cargo install --locked --version 0.18.3 cargo-deny

      - name: cargo audit
        run: |
          set -o pipefail
          cargo audit --deny warnings --ignore RUSTSEC-2024-0320 \
            2>&1 | tee "$SUPPLY_CHAIN_LOG_DIR/cargo-audit.log"

      - name: cargo deny check
        run: |
          set -o pipefail
          cargo deny --workspace check \
            2>&1 | tee "$SUPPLY_CHAIN_LOG_DIR/cargo-deny.log"

      - name: Banned-crates lockfile guard
        run: |
          set -o pipefail
          ./scripts/check-banned-crates.sh \
            2>&1 | tee "$SUPPLY_CHAIN_LOG_DIR/check-banned-crates.log"

      - name: Feature audit (cargo tree)
        run: |
          set -o pipefail
          {
            echo "=== cargo tree --workspace -e features (depth 6) ===" ;
            cargo tree --workspace --edges features --depth 6 ;
            echo ;
            echo "=== cargo tree --workspace --duplicates ===" ;
            cargo tree --workspace --duplicates || true ;
          } 2>&1 | tee "$SUPPLY_CHAIN_LOG_DIR/feature-audit.log"

      - name: Upload supply-chain logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: supply-chain-logs
          path: ${{ env.SUPPLY_CHAIN_LOG_DIR }}/
          if-no-files-found: warn

  dependency-review:
    name: Dependency review (PR only)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Dependency review
        # Soft-fails on repos where Dependency graph is not enabled — the
        # action requires that GitHub feature toggled on at the repository
        # level (Settings → Security → Dependency graph). When unavailable,
        # this job stays advisory rather than blocking the gate.
        continue-on-error: true
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: on-failure
