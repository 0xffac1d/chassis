# Local + CI Semgrep: conservative guardrails (Rust kernel / CLI).
#
# Exclusion philosophy: `crates/*/tests/**`, sibling `*_tests.rs` files, and
# inline `mod tests { ... }` blocks (gated by `#[cfg(test)]`) are not subject to
# panic/unwrap/println bans — those are unit-test scaffolding by design.
rules:
  - id: chassis-no-unwrap-in-cli
    languages: [rust]
    message: >
      Avoid .unwrap() in chassis-cli; use proper error handling (CH style).
    severity: ERROR
    patterns:
      - pattern: $X.unwrap(...)
      - pattern-not-inside: |
          #[cfg(test)]
          mod $M { ... }
      - pattern-not-inside: |
          #[test]
          fn $F(...) { ... }
    paths:
      include:
        - crates/chassis-cli/src/**/*.rs
      exclude:
        - "crates/chassis-cli/src/**/*tests*.rs"
        - "crates/chassis-cli/src/**/tests/**"

  - id: chassis-no-dbg-core
    languages: [rust]
    message: Remove dbg! from chassis-core (use tracing or structured errors).
    severity: ERROR
    pattern: dbg!(...)
    paths:
      include:
        - "crates/chassis-core/src/**/*.rs"
      exclude:
        - "crates/chassis-core/src/**/*tests*.rs"
        - "crates/chassis-core/src/**/tests/**"

  - id: chassis-no-println-core
    languages: [rust]
    message: Remove println! from chassis-core (keep I/O at CLI / JSON-RPC edges).
    severity: WARNING
    patterns:
      - pattern: println!(...)
      - pattern-not-inside: mod $M { ... }
    paths:
      # `crates/chassis-core/examples/` is intentionally illustrative; it is not
      # the library surface, so println! there is benign.
      include:
        - "crates/chassis-core/src/**/*.rs"
      exclude:
        - "crates/chassis-core/src/**/*tests*.rs"
        - "crates/chassis-core/src/**/tests/**"

  - id: chassis-no-panic-runtime-cli
    languages: [rust]
    message: Avoid panic!/todo!/unimplemented! outside tests in chassis-cli.
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern: panic!(...)
          - pattern: todo!(...)
          - pattern: unimplemented!(...)
      - pattern-not-inside: |
          #[cfg(test)]
          mod $M { ... }
      - pattern-not-inside: |
          #[test]
          fn $F(...) { ... }
    paths:
      include:
        - crates/chassis-cli/src/**/*.rs
      exclude:
        - "crates/chassis-cli/src/**/*tests*.rs"
        - "crates/chassis-cli/src/**/tests/**"

  - id: chassis-no-panic-runtime-core
    languages: [rust]
    message: Avoid panic!/todo!/unimplemented! outside tests in chassis-core.
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern: panic!(...)
          - pattern: todo!(...)
          - pattern: unimplemented!(...)
      - pattern-not-inside: mod $M { ... }
      # Build-time fail-fast: `compile_schema` / `from_embedded` validate that
      # `include_str!`-embedded JSON Schema is a valid jsonschema validator.
      # A failure here is a compile-time bug, not a runtime path.
      - pattern-not-inside: |
          fn compile_schema(...) { ... }
      - pattern-not-inside: |
          pub fn from_embedded(...) -> Self { ... }
      # `assert_adr_bound` is a documented test-only helper that panics with a
      # rich diagnostic when a caller's diagnostic is not ADR-bound.
      - pattern-not-inside: |
          pub fn assert_adr_bound(...) { ... }
    paths:
      include:
        - "crates/chassis-core/src/**/*.rs"
      exclude:
        - "crates/chassis-core/src/**/*tests*.rs"
        - "crates/chassis-core/src/**/tests/**"
