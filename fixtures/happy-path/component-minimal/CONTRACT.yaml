name: "component-minimal"
kind: component
version: "0.1.0"
purpose: "Minimal UI component happy-path fixture covering kind=component required arrays (props/events/slots/states)."
status: stable
since: "0.1.0"
assurance_level: declared
owner: chassis-fixtures
ui_taxonomy: presentational
props:
  - name: "label"
    type: "string"
    required: true
    description: "Button label rendered inside the component."
  - name: "disabled"
    type: "boolean"
    required: false
    description: "Disables click handling and applies visual disabled state."
    default: false
events:
  - name: "click"
    payload_schema_ref: "schemas/component-events/click.schema.json"
    description: "Fired when the button is activated via mouse, keyboard, or touch."
slots:
  - name: "icon"
    description: "Optional leading icon node."
    required: false
states:
  - name: "idle"
    transitions:
      - "loading"
      - "disabled"
    description: "Default interactive state."
  - name: "loading"
    transitions:
      - "idle"
  - name: "disabled"
    transitions:
      - "idle"
invariants:
  - id: component-minimal.props-required-explicit
    text: "Every prop declares an explicit required boolean."
  - id: component-minimal.states-form-graph
    text: "Each state transition target appears as a declared state."
edge_cases:
  - id: component-minimal.no-accessibility
    text: "Optional accessibility metadata is omitted to confirm the schema does not require it."
