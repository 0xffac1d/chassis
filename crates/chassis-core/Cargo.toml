[package]
name = "chassis-core"
version = "0.1.0"
edition = "2021"
description = "Typed contract / ADR / exemption / coherence vocabulary + JSON Schema validators."
license = "MIT OR Apache-2.0"
publish = false

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
jsonschema = "0.30"

[dev-dependencies]
serde_yaml = "0.9"
